name: Deploy astra-gateway

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy by building on VPS (glibc-compatible)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            export PATH="$HOME/.cargo/bin:$PATH"
            if ! command -v rustup >/dev/null 2>&1; then
              curl https://sh.rustup.rs -sSf | sh -s -- -y
              export PATH="$HOME/.cargo/bin:$PATH"
            fi
            rustup toolchain install stable --profile minimal
            rustup default stable

            cd /home/apps/sq/.dbs/infrastructure/astra-gateway
            git fetch --all --prune
            git reset --hard origin/main
            cargo build --release
            sudo install -m 0755 target/release/astra-db /usr/local/bin/astra-db
            sudo systemctl restart astradb-core
            sudo systemctl is-active astradb-core
            curl -skI https://opsdc.squareexp.com | head -n 1
