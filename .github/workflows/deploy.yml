name: Deploy axiomdb-gateway

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: axiomdb-gateway-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy by building on VPS (glibc-compatible)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail
            export PATH="$HOME/.cargo/bin:$PATH"
            if ! command -v rustup >/dev/null 2>&1; then
              curl https://sh.rustup.rs -sSf | sh -s -- -y
              export PATH="$HOME/.cargo/bin:$PATH"
            fi
            rustup toolchain install stable --profile minimal --component rustfmt --component clippy

            cd /home/apps/sq/.dbs/infrastructure/astra-gateway
            git fetch --all --prune
            git reset --hard origin/main

            export ASTRADB_CORE_ENV=/home/opsdc/.creds/astradb-core.env
            chmod +x ./migrate.sh
            sudo env ASTRADB_CORE_ENV="$ASTRADB_CORE_ENV" ./migrate.sh

            cargo build --release
            sudo install -m 0755 target/release/axiomdb-gateway /usr/local/bin/axiomdb-gateway
            sudo ln -sfn /usr/local/bin/axiomdb-gateway /usr/local/bin/astra-db
            sudo install -m 0644 astradb-core.service /etc/systemd/system/astradb-core.service
            sudo systemctl daemon-reload
            sudo systemctl restart astradb-core
            sudo systemctl is-active astradb-core
            curl -fsS https://opsdc.squareexp.com/api/v1/health >/dev/null || curl -skI https://opsdc.squareexp.com | head -n 1
